<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="script.js" defer></script>

    <div class="tasks-container">

        <li></li>
      </ul>
    </div>
  </div>
